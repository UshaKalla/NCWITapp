<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="phone">
        <div class="status-bar">
            <span>9:41</span>
            <span style="letter-spacing:1px">▐▐▐ ✦</span>
        </div>

        <div class="nav">
            <div class="logo">Flashion</div>
            <div class="nav-icons">
                <i class="ti ti-bell"></i
                <i class="ti ti-user-circle"></i>
            </div>
        </div>

        <div class="screen-container">
            <div id="screen-home" class="screen active">
  
  <div class="hero">
    <h2>Find the outfit<br>in your memory</h2>
    <p>Draw what you saw. We'll find where to buy it.</p>
  </div>
  
  <div class="input-modes">
    <div class="mode-card" onclick="switchScreen('draw')">
      <i class="ti ti-pencil"></i>
      <div class="label">Draw it</div>
      <span>Sketch from memory</span>
    </div>
    
    <div class="mode-card">
      <i class="ti ti-typography"></i>
      <div class="label">Describe it</div>
      <span>Type what you saw</span>
    </div>
    
    <div class="mode-card">
      <i class="ti ti-camera"></i>
      <div class="label">Photo it</div>
      <span>Upload a picture</span>
    </div>
  </div>
  
  <div class="recent">
    <div class="section-title">Recent searches</div>
    <div class="recent-grid">
      
      <div class="recent-card">
        <div class="recent-img">
          <svg width="60" height="80" viewBox="0 0 50 70">
            <path d="M25 5 L15 20 L5 18 L8 50 L42 50 L45 18 L35 20 Z" fill="none" stroke="#888" stroke-width="1.5"/>
            <path d="M15 20 Q25 28 35 20" fill="none" stroke="#888" stroke-width="1.5"/>
            <rect x="8" y="50" width="34" height="18" rx="2" fill="none" stroke="#888" stroke-width="1.5"/>
          </svg>
        </div>
        <p>Emerald green gown</p>
      </div>

      <div class="recent-card">
        <div class="recent-img">
          <svg width="60" height="80" viewBox="0 0 50 70">
            <rect x="12" y="5" width="26" height="30" rx="2" fill="none" stroke="#888" stroke-width="1.5"/>
            <path d="M12 35 L8 65 L42 65 L38 35 Z" fill="none" stroke="#888" stroke-width="1.5"/>
            <path d="M12 5 L5 20" fill="none" stroke="#888" stroke-width="1.5"/>
            <path d="M38 5 L45 20" fill="none" stroke="#888" stroke-width="1.5"/>
          </svg>
        </div>
        <p>White linen blazer</p>
      </div>

    </div>
  </div>

</div>
            </div>
        <div class="tab-bar">
            </div>
    
    </div>
    <script src="script.js"></script>
</body>
</html>
